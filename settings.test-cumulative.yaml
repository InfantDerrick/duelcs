# Cumulative timed mode — everyone scores on every problem once
# Run: yarn duelcs host --config settings.test-cumulative.yaml --name Kiwi

mode: cumulative

duration_minutes: 15
# No early win — highest score when timer hits 0
win_score: null

problem_count: 3

difficulty:
  - Easy
  - Medium

topics:
  - array
  - hash-table
  - string

exclude_premium: true
seed: 7
points: [100, 200, 300]
